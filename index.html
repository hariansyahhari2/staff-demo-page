<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2 text-center">Visitor Registration</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-8">Please complete the form below to register your attendance at the branch.</p>
<form class="space-y-6" id="visitorRegistrationForm">
<!-- Staff / Member ID / Employer No -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block font-label-lg text-label-lg text-on-surface" for="staffId">Staff ID</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="staffId" name="staffId" placeholder="Enter Staff ID" type="text">
</div>
<div class="space-y-2">
<label class="block font-label-lg text-label-lg text-on-surface" for="customerId" id="customerIdLabel">Member IC / Passport<span class="text-error ml-1">*</span></label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="customerId" name="customerId" placeholder="Enter Member IC / Passport" type="text" required="">
</div>
</div>
<!-- Branch Location - temporarily hidden, keep for future use. -->
<div class="space-y-2" style="display:none">
<label class="block font-label-lg text-label-lg text-on-surface" for="branchSearch">Branch Location<span class="text-error ml-1">*</span></label>
<div class="relative">
<input class="w-full bg-surface border border-outline-variant rounded-lg pl-12 pr-12 py-3 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="branchSearch" name="branchSearch" placeholder="Search or select branch..." type="search" autocomplete="off" role="combobox" aria-controls="branchDropdown" aria-expanded="false">
<input id="branch" name="branch" type="hidden">
<div class="pointer-events-none absolute top-0 bottom-0 left-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">search</span>
</div>
<button class="absolute top-0 bottom-0 right-0 flex items-center px-4 text-on-surface-variant" id="branchDropdownButton" type="button" aria-label="Show branch options">
<span class="material-symbols-outlined">expand_more</span>
</button>
<div class="branch-dropdown absolute z-20 mt-2 max-h-72 w-full overflow-y-auto rounded-lg border border-outline-variant bg-surface-container-lowest shadow-lg" id="branchDropdown" role="listbox" hidden=""></div>
</div>
</div>

<!-- User Category -->
<div class="space-y-3">
<label class="block font-label-lg text-label-lg text-on-surface">User Category<span class="text-error ml-1">*</span></label>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
<div>
<input checked="" class="hidden custom-radio" id="cat-member" name="category" onchange="updateReasons()" type="radio" value="member">
<label class="block w-full text-center border border-outline-variant rounded-lg px-4 py-3 font-label-lg text-label-lg text-on-surface-variant cursor-pointer hover:bg-surface-container-low transition-colors" for="cat-member">Member</label>
</div>

</div> -->

<p id="formHint" class="hidden mt-3 text-error text-body-sm text-center">Please fill in all required fields before registering.</p>
</div>
</form>
</div>

        function setBranchValidity() {
            // Temporarily disabled — branch field is hidden
            document.getElementById('branchSearch').setCustomValidity('');
        }

        function renderBranchOptions(options = branchOptions) {
            const branchDropdown = document.getElementById('branchDropdown');

            if (options.length === 0) {
                branchDropdown.innerHTML = '<div class="px-4 py-3 text-body-sm text-on-surface-variant">No branches found</div>';
                return;
            }

            branchDropdown.innerHTML = options.map(branch => `
                <button class="w-full px-4 py-3 text-left hover:bg-surface-container-low focus:bg-surface-container-low focus:outline-none" type="button" role="option" data-branch-code="${branch.code}" data-branch-name="${branch.name}">
                    <span class="block font-label-lg text-label-lg text-on-surface">${branch.name}</span>
                    <span class="block font-label-sm text-label-sm text-on-surface-variant">Branch Code ${branch.code}</span>
                </button>
            `).join('');
        }

        function openBranchDropdown() {
            const branchDropdown = document.getElementById('branchDropdown');
            const branchInput = document.getElementById('branchSearch');
            branchDropdown.hidden = false;
            branchInput.setAttribute('aria-expanded', 'true');
        }

        function closeBranchDropdown() {
            const branchDropdown = document.getElementById('branchDropdown');
            const branchInput = document.getElementById('branchSearch');
            branchDropdown.hidden = true;
            branchInput.setAttribute('aria-expanded', 'false');
        }

        function filterBranchOptions() {
            const branchInput = document.getElementById('branchSearch');
            const query = branchInput.value.trim().toLowerCase();
            const filteredBranches = branchOptions.filter(branch => {
                return branch.name.toLowerCase().includes(query) || branch.code.toLowerCase().includes(query);
            });

            document.getElementById('branch').value = '';
            setBranchValidity();
            renderBranchOptions(filteredBranches);
            openBranchDropdown();
            updateSubmitButtonState();
        }

        function selectBranch(branchCode, branchName) {
            document.getElementById('branch').value = branchCode;
            document.getElementById('branchSearch').value = branchName;
            setBranchValidity();
            closeBranchDropdown();
            updateSubmitButtonState();
        }

        function currentReasonOptions() {
            const category = document.querySelector('input[name="category"]:checked').value;
            return reasonOptionsByCategory[category] || [];
        }

        function setReasonValidity() {
            // Temporarily disabled — reason field is hidden
            document.getElementById('reasonSearch').setCustomValidity('');
        }

        function renderReasonOptions(options = currentReasonOptions()) {
            const reasonDropdown = document.getElementById('reasonDropdown');

            if (options.length === 0) {
                reasonDropdown.innerHTML = '<div class="px-4 py-3 text-body-sm text-on-surface-variant">No reasons found</div>';
                return;
            }

            reasonDropdown.innerHTML = options.map(reason => `
                <button class="w-full px-4 py-3 text-left hover:bg-surface-container-low focus:bg-surface-container-low focus:outline-none" type="button" role="option" data-reason-value="${reason.value}" data-reason-text="${reason.text}">
                    <span class="block font-label-lg text-label-lg text-on-surface">${reason.text}</span>
                </button>
            `).join('');
        }

        function openReasonDropdown() {
            const reasonDropdown = document.getElementById('reasonDropdown');
            const reasonInput = document.getElementById('reasonSearch');
            reasonDropdown.hidden = false;
            reasonInput.setAttribute('aria-expanded', 'true');
        }

        function closeReasonDropdown() {
            const reasonDropdown = document.getElementById('reasonDropdown');
            const reasonInput = document.getElementById('reasonSearch');
            reasonDropdown.hidden = true;
            reasonInput.setAttribute('aria-expanded', 'false');
        }

        function filterReasonOptions() {
            const reasonInput = document.getElementById('reasonSearch');
            const query = reasonInput.value.trim().toLowerCase();
            const filteredReasons = currentReasonOptions().filter(reason => {
                return reason.text.toLowerCase().includes(query) || reason.value.toLowerCase().includes(query);
            });

            document.getElementById('reason').value = '';
            setReasonValidity();
            renderReasonOptions(filteredReasons);
            openReasonDropdown();
            updateSubmitButtonState();
        }

        function selectReason(reasonValue, reasonText) {
            document.getElementById('reason').value = reasonValue;
            document.getElementById('reasonSearch').value = reasonText;
            setReasonValidity();
            closeReasonDropdown();
            updateSubmitButtonState();
        }

        const customerIdLabels = {
            member: 'Member IC / Passport',
            employer: 'Employer No'
        };

        function updateReasons() {
            document.getElementById('reason').value = '';
            document.getElementById('reasonSearch').value = '';
            setReasonValidity();
            renderReasonOptions();

            const category = document.querySelector('input[name="category"]:checked').value;
            const labelText = customerIdLabels[category] || 'Member IC / Passport';
            const labelEl = document.getElementById('customerIdLabel');
            labelEl.childNodes[0].textContent = labelText;
            document.getElementById('customerId').placeholder = 'Enter ' + labelText;

            updateSubmitButtonState();
        }

        function updateSubmitButtonState() {
            const form = document.getElementById('visitorRegistrationForm');
            const submitButton = document.getElementById('submitButton');
            const formIsValid = form.checkValidity();

            submitButton.setAttribute('aria-disabled', String(!formIsValid));
            submitButton.classList.toggle('button-disabled', !formIsValid);

            if (formIsValid) {
                document.getElementById('formHint').classList.add('hidden');
            }
        }

        const visitorRegistrationForm = document.getElementById('visitorRegistrationForm');

        visitorRegistrationForm.addEventListener('input', updateSubmitButtonState);
        visitorRegistrationForm.addEventListener('change', updateSubmitButtonState);

        const reasonInput = document.getElementById('reasonSearch');
        const reasonDropdown = document.getElementById('reasonDropdown');

        reasonInput.addEventListener('input', filterReasonOptions);
        reasonInput.addEventListener('focus', function() {
            renderReasonOptions();
            openReasonDropdown();
        });

        document.getElementById('reasonDropdownButton').addEventListener('click', function() {
            renderReasonOptions();
            openReasonDropdown();

        reasonDropdown.addEventListener('click', function(event) {

            if (!option) {
                return;

            selectReason(option.dataset.reasonValue, option.dataset.reasonText);
        });

        document.addEventListener('click', function(event) {
            if (!event.target.closest('#reasonDropdown') && !event.target.closest('#reasonSearch') && !event.target.closest('#reasonDropdownButton')) {
                closeReasonDropdown();
            }
        });

        // /*
        // Branch location dropdown event bindings are temporarily disabled.
        const branchInput = document.getElementById('branchSearch');
        const branchDropdown = document.getElementById('branchDropdown');

        branchInput.addEventListener('input', filterBranchOptions);
        branchInput.addEventListener('focus', function() {

            }
        });

        document.getElementById('submitButton').addEventListener('click', function(event) {
            if (visitorRegistrationForm.checkValidity()) {

            event.preventDefault();
            document.getElementById('formHint').classList.remove('hidden');
            visitorRegistrationForm.reportValidity();
        });

        visitorRegistrationForm.addEventListener('submit', function(event) {

            if (!this.checkValidity()) {
                document.getElementById('formHint').classList.remove('hidden');
                this.reportValidity();
                return;
            }

            const category = document.querySelector('input[name="category"]:checked').value;
            window.location.href = categoryRedirectUrls[category];
        });
