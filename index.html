            background-color: theme('colors.primary');

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim border-b border-outline-variant dark:border-outline full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop max-w-container-max-width mx-auto h-16">
<div class="flex items-center gap-4">
<img alt="EPF Logo" class="h-8 w-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqlwqoj-mI4Bka1s5kab8KK0WWPP3pcwTz721Qhb_s6mY2htGTTQi0qBTi56nwKMVaoP7Hwj4XUaFOUbcQ2vBlSFugH6vBhO8mHP_yl8F4rZo7IiQ798m5zMmhNk3ahEofPJqy9i1q_LkrErvmOk_Mz6FiTDZ3_O0Qj8qFdLqq_dUFk6dDALxzSztjOhQJX5VdRWQjJXDPeQskKCsdC6rpc5anbElgfsudlFVMmuy11-ozfvZbHbw7HO6e1eSGMQB98a5wZC8sZPM">
<span class="text-headline-md font-headline-md font-bold text-primary dark:text-inverse-primary hidden md:block">EPF Branch Portal</span>
</div>
<div class="flex items-center gap-4">
<button class="text-primary dark:text-inverse-primary hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">help</span>
</button>
<button class="text-primary dark:text-inverse-primary hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">language</span>
</button>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center py-12 px-margin-mobile md:px-margin-desktop">
<div class="w-full max-w-2xl bg-surface-container-lowest rounded-xl border border-outline-variant p-8 md:p-12 shadow-[0_4px_12px_rgba(0,0,0,0.05)]">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2 text-center">Visitor Registration</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-8">Please complete the form below to register your attendance at the branch.</p>
<form class="space-y-6">
<!-- Staff / Customer ID -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block font-label-lg text-label-lg text-on-surface" for="staffId">Staff ID</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="staffId" name="staffId" placeholder="Enter Staff ID" type="text">
</div>
<div class="space-y-2">
<label class="block font-label-lg text-label-lg text-on-surface" for="customerId">Customer ID</label>
<input class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="customerId" name="customerId" placeholder="Enter Customer ID" type="text">
</div>
</div>
<!-- User Category -->
<div class="space-y-3">
<label class="block font-label-lg text-label-lg text-on-surface">User Category</label>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
<div>
<input checked="" class="hidden custom-radio" id="cat-member" name="category" type="radio">
<label class="block w-full text-center border border-outline-variant rounded-lg px-4 py-3 font-label-lg text-label-lg text-on-surface-variant cursor-pointer hover:bg-surface-container-low transition-colors" for="cat-member">Member</label>
</div>
<div>
<input class="hidden custom-radio" id="cat-employer" name="category" type="radio">
<label class="block w-full text-center border border-outline-variant rounded-lg px-4 py-3 font-label-lg text-label-lg text-on-surface-variant cursor-pointer hover:bg-surface-container-low transition-colors" for="cat-employer">Employer</label>
</div>
<div>
<input class="hidden custom-radio" id="cat-corporate" name="category" type="radio">
<label class="block w-full text-center border border-outline-variant rounded-lg px-4 py-3 font-label-lg text-label-lg text-on-surface-variant cursor-pointer hover:bg-surface-container-low transition-colors" for="cat-corporate">Corporate</label>
</div>

</div>
</div>
<!-- Reason for Attendance -->
<div class="space-y-2">
<label class="block font-label-lg text-label-lg text-on-surface" for="reason">Reason for Attendance</label>
<div class="relative">
<select class="w-full appearance-none bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="reason" name="reason" onchange="toggleOtherReason(this)"><option disabled="" selected="" value="">Select a reason...</option>
<option value="sst">SST(nomination)</option>
<option value="mip">mip</option>
<option value="eip">eip</option>
<option value="e-service-withdrawal">e service corner (withrdawal)</option></select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Other Reason Text Area (Hidden by default) -->
<div class="space-y-2 hidden" id="otherReasonContainer">
<label class="block font-label-lg text-label-lg text-on-surface" for="otherReason">Please Specify</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors resize-none" id="otherReason" name="otherReason" placeholder="Provide details here..." rows="3"></textarea>
</div>
<!-- Action Button -->
<div class="pt-4">
<a href="https://iakaun.kwsp.gov.my/portal/member/login" class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-lg text-label-lg py-4 rounded-lg transition-colors duration-200 flex justify-center items-center gap-2">
<span class="">Register Attendance</span>
<span class="material-symbols-outlined">arrow_forward</span>
</a>
</div>
</form>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface-container-highest dark:bg-inverse-surface border-t border-outline-variant full-width bottom-0">
<div class="w-full py-stack-lg px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-base max-w-container-max-width mx-auto">
<div class="flex flex-col items-center md:items-start gap-2">
<span class="font-headline-md text-headline-md font-bold text-on-surface">EPF</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">© 2024 Employees Provident Fund. All Rights Reserved.</span>
</div>
<div class="flex flex-wrap justify-center gap-6">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface hover:underline transition-all" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface hover:underline transition-all" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface hover:underline transition-all" href="#">Contact Us</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface hover:underline transition-all" href="#">Branch Locator</a>
</div>
</div>
</footer>
<script>
        function toggleOtherReason(selectElement) {
            const container = document.getElementById('otherReasonContainer');
            if (selectElement.value === 'others') {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }
    </script>




</body></html>
